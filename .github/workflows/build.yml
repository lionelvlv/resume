name: Build LaTeX Resume

on:
  push:
    branches: 
      - main
    paths:
      - '**.tex'
      - '**.cls'
      - '.github/workflows/latex-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-latex:
    runs-on: ubuntu-latest
    # Prevent infinite loops - skip if last commit was from this bot
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Lionel_Verano_Resume.tex
          args: -pdf -file-line-error -interaction=nonstopmode
          compiler: latexmk
      
      - name: Validate PDF output
        run: |
          if [ ! -f Lionel_Verano_Resume.pdf ]; then
            echo "❌ Error: PDF was not generated!"
            exit 1
          fi
          
          PDF_SIZE=$(du -h Lionel_Verano_Resume.pdf | cut -f1)
          echo "✅ PDF generated successfully!"
          echo "📄 File size: $PDF_SIZE"
          
          # Check if PDF has reasonable size
          if [ $(stat -c%s Lionel_Verano_Resume.pdf) -lt 10000 ]; then
            echo "⚠️ Warning: PDF seems too small (less than 10KB)"
            exit 1
          fi
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet Lionel_Verano_Resume.pdf || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit PDF to repository
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Lionel_Verano_Resume.pdf
          git commit -m "Auto-update resume PDF [skip ci]
          
          Built from commit: ${{ github.sha }}
          Triggered by: ${{ github.event.head_commit.message }}"
          git push
      
      - name: Generate access URLs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "🎉 Resume PDF updated successfully!"
          echo ""
          echo "📥 Direct download link:"
          echo "https://github.com/${{ github.repository }}/raw/main/Lionel_Verano_Resume.pdf"
          echo ""
          echo "👁️ View in browser:"
          echo "https://github.com/${{ github.repository }}/blob/main/Lionel_Verano_Resume.pdf"
          echo ""
          echo "🔗 Raw content (for embedding):"
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/Lionel_Verano_Resume.pdf"
      
      - name: No changes detected
        if: steps.check_changes.outputs.changed != 'true'
        run: |
          echo "ℹ️ PDF is already up to date, no commit needed"
