name: Build and Commit PDF

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-full

      - name: Compile LaTeX
        run: latexmk -pdf -interaction=nonstopmode Lionel_Verano_Resume.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Lionel_Verano_Resume.pdf
          git commit -m "Auto-build resume PDF" || echo "No changes to commit"
          git push
